<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>ChessBot Config</title>
    <style>
      body {
        font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
        width: 300px;
        padding: 20px;
        margin: 0;
        background: #1e1e1e;
        color: #ffffff;
      }
      h2 {
        margin-top: 0;
        font-size: 18px;
        color: #4CAF50;
      }
      .container {
        display: flex;
        flex-direction: column;
        gap: 12px;
      }
      input {
        padding: 8px;
        background: #2a2a2a;
        border: 1px solid #444;
        color: white;
        border-radius: 4px;
        width: 100%;
        box-sizing: border-box;
      }
      button {
        padding: 8px 16px;
        background: #4CAF50;
        color: white;
        border: none;
        border-radius: 4px;
        cursor: pointer;
        font-weight: bold;
      }
      button:hover {
        background: #45a049;
      }
      #status {
        color: #4CAF50;
        font-size: 14px;
        height: 20px;
      }
      .hidden {
        display: none !important;
      }
      #configured-view {
        text-align: center;
        padding: 20px 0;
      }
    </style>
  </head>
  <body>
      <div id="configured-view" class="container hidden">
        <h2>ChessBot is Ready!</h2>
        <div style="font-size: 14px; margin-bottom: 10px; color: #ddd;">
          Open chess.com and a board will automatically connect.
        </div>
        
        <button id="popup-suggest-btn" style="background-color: #4CAF50; margin-bottom: 10px; padding: 12px; font-size: 16px;">
          🤖 Suggest Best Move
        </button>

        <button id="popup-analyze-btn" style="background-color: #2196F3; margin-bottom: 15px; padding: 12px; font-size: 16px;">
          📊 Analyze Game
        </button>

        <button id="change-key-btn" style="background: #444;">Change API Key</button>
      </div>

    <div id="setup-view" class="container hidden">
      <h2>API Key Setup</h2>
      <p style="font-size: 12px; color: #aaa; margin: 0;">Enter your OpenRouter API key to power the engine.</p>
      <input type="password" id="key-input" placeholder="sk-or-v1-..." />
      <button id="save">Save Key</button>
      <div id="status"></div>
    </div>

    <script type="module" src="/src/popup.ts"></script>
  </body>
</html>
